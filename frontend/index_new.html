<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>岭南康养·灵境向导 | AI智能体</title>
    <link rel="stylesheet" href="css/style_new.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- 主容器——岭南花窗风格 -->
    <div class="main-container">
        <!-- 头部: 镬耳墙抽象 + 醒狮元素 -->
        <header class="app-header">
            <div class="header-top">
                <div class="logo-section">
                    <div class="logo-icon">🦁</div>
                    <h1>岭南康养·灵境向导</h1>
                    <span class="badge">AI Agent</span>
                </div>
                <div class="header-sub">
                    <span>🌿 广府·潮汕·客家</span>
                    <span>🧧 凉茶 | 药膳 | 节气养生</span>
                </div>
            </div>

            <!-- 导航标签 -->
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="chat">💬 智能对话</button>
                <button class="nav-tab" data-tab="culture">🏛️ 文化科普</button>
                <button class="nav-tab" data-tab="health">🌿 养生方案</button>
                <button class="nav-tab" data-tab="calendar">📅 节气日历</button>
            </nav>
        </header>

        <!-- 主内容区 -->
        <main class="app-content">
            <!-- 智能对话面板 -->
            <section id="chat-panel" class="content-panel active">
                <div class="chat-panel-inner">
                    <div class="chat-messages" id="chat-messages">
                        <div class="message ai-message">
                            <div class="bubble">
                                🍵 吉祥如意！我是「岭南康养向导」<br>
                                我可以为您：<br>
                                • 科普岭南文化习俗、非遗、饮食智慧<br>
                                • 解答健康疑问（结合岭南气候/体质）<br>
                                • 推荐养生食疗、穴位按摩、节气方案<br><br>
                                试试下方快捷按钮，或直接提问吧！
                            </div>
                            <div class="message-avatar">🌺 灵境康养</div>
                        </div>
                    </div>

                    <!-- 快捷提问 -->
                    <div class="quick-actions">
                        <button class="quick-btn" data-msg="介绍一下岭南木棉花的食疗价值">🌸 木棉花食疗</button>
                        <button class="quick-btn" data-msg="我最近上火，舌尖红，可以喝什么凉茶？">🔥 上火凉茶</button>
                        <button class="quick-btn" data-msg="清明节气岭南养生推荐">🌧️ 清明养生</button>
                        <button class="quick-btn" data-msg="痰湿体质适合什么岭南药膳？">🍲 痰湿体质药膳</button>
                        <button class="quick-btn" data-msg="讲一讲醒狮与岭南健康文化">🦁 醒狮+康养</button>
                    </div>

                    <!-- 输入区 -->
                    <div class="input-area">
                        <input type="text" id="user-input" placeholder="例如：广式煲汤的祛湿秘诀..." autocomplete="off">
                        <button id="send-btn">发送</button>
                    </div>
                </div>
            </section>

            <!-- 文化科普面板 -->
            <section id="culture-panel" class="content-panel">
                <div class="panel-inner">
                    <div class="category-tabs">
                        <button class="category-tab active" data-category="heritage">🏮 非遗文化</button>
                        <button class="category-tab" data-category="architecture">🏯 岭南建筑</button>
                        <button class="category-tab" data-category="food">🍲 饮食文化</button>
                        <button class="category-tab" data-category="customs">🎊 民俗节日</button>
                    </div>
                    <div class="cards-grid" id="culture-cards">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </section>

            <!-- 养生方案面板 -->
            <section id="health-panel" class="content-panel">
                <div class="panel-inner">
                    <div class="health-sidebar">
                        <h3>方案类型</h3>
                        <div class="health-options">
                            <button class="health-option active" data-type="seasonal">🌸 季节养生</button>
                            <button class="health-option" data-type="constitution">🧘 体质养生</button>
                            <button class="health-option" data-type="diet">🍵 食疗药膳</button>
                        </div>
                    </div>
                    <div class="health-content" id="health-content">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </section>

            <!-- 节气日历面板 -->
            <section id="calendar-panel" class="content-panel">
                <div class="panel-inner">
                    <div class="calendar-header">
                        <h2>二十四节气养生日历</h2>
                        <div class="year-selector">
                            <button class="year-btn" id="prev-year">◀</button>
                            <span id="current-year">2024</span>
                            <button class="year-btn" id="next-year">▶</button>
                        </div>
                    </div>
                    <div class="solar-terms-grid" id="solar-terms-grid">
                        <!-- 24节气卡片 -->
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            🌟 基于岭南医学/民俗知识库（AI+RAG）· 智能体原创设计 | 养生方案仅供参考
        </footer>
    </div>
</div>

<!-- 详情弹窗 -->
<div id="detail-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">详情</h2>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body">
            <!-- 动态内容 -->
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/app_new.js"></script>
</body>
</html>
